<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SZK">
<meta name="theme-color" content="#061018">
<title>⚽ SZKアプリ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g2:#22a050;--g3:#0d5028;--g4:#061018;
  --pitch:#1d6633;--pitch2:#185a2c;
  --acc:#f0c040;--red:#e84040;--blue:#4aa8e8;
  --bg:#070f1c;--card:#0d1f32;--card2:#091828;--bdr:#1a3050;
  --tx:#ddeaf8;--dim:#5a7890;
  --in:#30d080;--out:#ff5060;
  --sw:152px;--hh:48px;
}
html{height:100%;height:100dvh}
body{
  height:100%;height:100dvh;
  width:100%;
  overflow:hidden;
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Meiryo',sans-serif;
  background:var(--bg);color:var(--tx);font-size:14px;
  -webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;
}
button{cursor:pointer;border:none;border-radius:6px;padding:6px 12px;
  font-family:inherit;font-size:13px;transition:all .13s;outline:none;line-height:1.3}
button:active{filter:brightness(.75);transform:scale(.95)}
select{background:var(--card);color:var(--tx);border:1px solid var(--bdr);
  border-radius:6px;padding:4px 7px;font-family:inherit;font-size:12px;outline:none}
input[type=text],input[type=password],input[type=date],input[type=number],textarea{
  background:var(--card);color:var(--tx);border:1px solid var(--bdr);
  border-radius:7px;padding:7px 10px;font-family:inherit;font-size:13px;outline:none}
textarea{resize:vertical;line-height:1.5}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--g4);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.12);
  border-top-color:var(--acc);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-logo{font-size:58px;font-weight:900;color:var(--acc);letter-spacing:7px;
  text-shadow:0 0 40px rgba(240,192,64,.45)}

/* ── SCREENS ── */
.scr{position:fixed;inset:0;z-index:8000;display:none;align-items:center;
  justify-content:center;padding:16px;
  background:radial-gradient(ellipse at 25% 15%,#082614 0%,#040e18 55%,#020810 100%)}
.scr::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.09) 1px,transparent 1px);
  background-size:42px 42px;pointer-events:none;opacity:.3}
.scr.on{display:flex}
.lcard{position:relative;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;
  padding:28px 22px;width:100%;max-width:420px;
  backdrop-filter:blur(14px);box-shadow:0 24px 80px rgba(0,0,0,.72)}
.l-logo{text-align:center;font-size:52px;font-weight:900;color:var(--acc);
  letter-spacing:7px;margin-bottom:2px}
.l-sub{text-align:center;font-size:11px;color:rgba(255,255,255,.28);
  letter-spacing:.2em;text-transform:uppercase;margin-bottom:22px}
.l-lbl{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:6px}
.l-err{font-size:12px;color:#ff7070;text-align:center;min-height:16px;margin-top:6px}
.l-go{width:100%;background:linear-gradient(135deg,var(--g2),var(--g3));
  color:#fff;font-size:15px;font-weight:700;padding:12px;border-radius:10px;
  margin-top:12px;box-shadow:0 5px 22px rgba(26,122,60,.35)}
.lg-grid,.rl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.lg-btn,.rl-btn{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);
  border-radius:13px;padding:18px 10px;text-align:center;cursor:pointer;
  transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.lg-btn .e,.rl-btn .e{font-size:30px}
.lg-btn .n,.rl-btn .n{font-size:14px;font-weight:800;color:#fff}
.lg-btn .s,.rl-btn .r{font-size:10px;color:rgba(255,255,255,.32)}
.lg-btn:hover,.rl-btn:hover{background:rgba(240,192,64,.12);border-color:var(--acc)}
.l-back{background:transparent;color:rgba(255,255,255,.35);font-size:12px;
  padding:4px;text-decoration:underline;margin-top:8px;display:inline-block}

/* ══════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════ */
/* APP SHELL */
#app{
  display:none;
  flex-direction:column;
  height:100%;
  height:100dvh;
  width:100%;
  overflow:hidden;
}
#app.on{display:flex}

/* Header */
#hdr{height:var(--hh);flex-shrink:0;
  background:linear-gradient(90deg,#071420,#0c2235,#071420);
  border-bottom:2px solid var(--g3);
  display:flex;align-items:center;padding:0 8px;gap:5px;overflow:hidden}
.h-logo{font-size:15px;font-weight:900;color:var(--acc);letter-spacing:3px;flex-shrink:0}
.h-dv{width:1px;height:18px;background:var(--bdr);flex-shrink:0}
.h-lg{font-size:11px;font-weight:700;color:#88ccaa;flex-shrink:0}
.h-badge{font-size:10px;padding:2px 7px;border-radius:9px;flex-shrink:0}
.h-badge.mgr{background:var(--acc);color:#000;font-weight:700}
.h-badge.view{background:#1a2a3a;color:#6a9ab0}
.h-sp{flex:1;min-width:2px}
.hb{background:rgba(255,255,255,.08);color:var(--tx);font-size:10px;
  padding:4px 7px;white-space:nowrap;flex-shrink:0}
.hb:hover{background:rgba(255,255,255,.16)}
.hb.green{background:rgba(26,122,60,.35);color:#88e0a0;border:1px solid rgba(34,160,80,.28)}
.hb.acc{background:rgba(240,192,64,.2);color:var(--acc);border:1px solid rgba(240,192,64,.3)}

/* Top nav (league tabs + stats) */
#top-nav{height:36px;flex-shrink:0;background:var(--card2);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:stretch}
.tn-tab{padding:0 14px;font-size:11px;font-weight:700;color:var(--dim);
  cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;
  display:flex;align-items:center;transition:all .12s}
.tn-tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.tn-tab:hover:not(.on){color:var(--tx)}
.tn-sp{flex:1}

/* Match tabs */
#match-tabs{height:32px;flex-shrink:0;background:var(--bg);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:stretch;overflow-x:auto}
#match-tabs::-webkit-scrollbar{height:2px}
.mtab{padding:0 11px;font-size:10px;font-weight:700;color:var(--dim);
  cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;
  display:flex;align-items:center;transition:all .12s}
.mtab.on{color:var(--acc);border-bottom-color:var(--acc)}
.mtab:hover:not(.on){color:var(--tx)}

/* Body — 残り高さ全部 */
#body{
  flex:1;
  display:flex;
  overflow:hidden;
  /* 明示的に高さを計算: 全体 - ヘッダー - top-nav - match-tabs */
  height:calc(100dvh - var(--hh) - 36px - 32px);
}

/* ══════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════ */
#sb{
  width:var(--sw);
  flex-shrink:0;
  background:var(--card2);
  border-right:1px solid var(--bdr);
  display:flex;
  flex-direction:column;
  /* 高さを明示的に指定 */
  height:calc(100dvh - var(--hh) - 36px - 32px);
  max-height:calc(100dvh - var(--hh) - 36px - 32px);
  overflow:hidden;
  transition:width .22s ease;
}
#sb.collapsed{width:32px}
#sb.collapsed .sb-filter,
#sb.collapsed .sb-tools,
#sb.collapsed .pl-list,
#sb.collapsed .sb-cnt{display:none!important}
#sb.collapsed .sb-hd{padding:0;justify-content:center}
#sb.collapsed .sb-hd-label{display:none}
.sb-toggle{
  background:none;color:var(--acc);font-size:14px;
  padding:0;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border:1px solid rgba(240,192,64,.25);
}
.sb-toggle:hover{background:rgba(240,192,64,.12)}
.sb-hd{padding:6px 7px;flex-shrink:0;
  background:rgba(0,0,0,.3);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;font-weight:700;min-height:34px}
.sb-cnt{color:var(--dim);font-size:9px}
.sb-filter{padding:3px 4px;flex-shrink:0;border-bottom:1px solid var(--bdr);display:flex;gap:2px}
.sf{flex:1;background:rgba(255,255,255,.04);color:var(--dim);
  font-size:10px;padding:3px 2px;border-radius:4px;text-align:center}
.sf.on{background:rgba(26,122,60,.3);color:#88dda8;font-weight:700}
.sb-tools{padding:4px;flex-shrink:0;border-bottom:1px solid var(--bdr);
  display:flex;flex-direction:column;gap:2px}
.sbt{background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);
  font-size:9px;padding:4px 6px;text-align:left;border-radius:4px}
.sbt:hover{background:rgba(255,255,255,.1)}
.pl-list{
  flex:1;
  /* iOSでスクロールするには明示的な高さが必要 */
  height:0;          /* flex:1 と組み合わせてスクロール領域を確定 */
  overflow-y:scroll; /* autoではなくscrollで確実に */
  overflow-x:hidden;
  padding:3px;
  -webkit-overflow-scrolling:touch;
}
.pl-item{display:flex;align-items:center;gap:3px;padding:4px;border-radius:5px;
  margin-bottom:2px;border:1px solid transparent;
  user-select:none;-webkit-user-select:none;cursor:grab;
  background:rgba(255,255,255,.02)}
.pl-item.pres{background:rgba(12,72,36,.38);border-color:rgba(34,160,80,.22)}
.pl-item.abs{opacity:.38}
.pl-cb{width:13px;height:13px;flex-shrink:0;accent-color:#22a050;cursor:pointer}
.pl-num{font-size:9px;color:var(--dim);width:15px;text-align:right;flex-shrink:0}
.pl-nick{font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pl-item.pres .pl-nick{color:#a8e8b8;font-weight:700}
.pl-pts{font-size:9px;color:var(--acc);font-weight:700;flex-shrink:0;
  background:rgba(240,192,64,.12);padding:1px 3px;border-radius:3px}
.pl-lg{font-size:7px;padding:1px 3px;border-radius:3px;flex-shrink:0;font-weight:700}
.pl-lg.都{background:rgba(74,168,232,.22);color:#7ac0f0}
.pl-lg.世{background:rgba(155,89,182,.22);color:#c090e0}
.pl-lg.両{background:rgba(240,192,64,.18);color:#d4aa40}

/* ══════════════════════════════════════════════
   CONTENT AREA — 縦スクロール
══════════════════════════════════════════════ */
#cont{
  flex:1;
  min-width:0;
  height:calc(100dvh - var(--hh) - 36px - 32px);
  max-height:calc(100dvh - var(--hh) - 36px - 32px);
  overflow-y:scroll;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:8px;
}
#mc{display:none;flex-direction:column;gap:8px;width:100%}
#mc.on{display:flex}
#mc{display:none;flex-direction:column;gap:8px;width:100%}
#mc.on{display:flex}
#stats-view{display:none;flex-direction:column;gap:10px;padding:4px;width:100%}
#stats-view.on{display:flex}

/* ══════════════════════════════════════════════
   QUARTERS — スマホ縦:1列、横:2列
══════════════════════════════════════════════ */
.halves{display:flex;flex-direction:column;gap:8px;width:100%}
.half-row{display:flex;gap:8px;width:100%}
/* スマホ縦(〜480px): 1列に変更して右はみ出し解消 */
@media(max-width:480px){
  .half-row{flex-direction:column}
  .half-row .qcard{width:100%}
}
/* 481px以上: 横2列 */
@media(min-width:481px){
  .half-row .qcard{flex:1;min-width:0}
}

/* Empty */
#no-m{padding:40px 16px;text-align:center;color:var(--dim)}
#no-m .nm-ico{font-size:48px;margin-bottom:12px}
#no-m .nm-t{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--tx)}

/* Match info bar */
.m-info{background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:8px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  width:100%;overflow:hidden}
.mi-date{font-size:12px;font-weight:800;color:var(--acc)}
.mi-vs{font-size:11px;font-weight:700;word-break:break-all}
.mi-venue{font-size:10px;color:var(--dim)}
.mi-sep{color:var(--dim);font-weight:700}
.mi-type{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700}
.mi-type.official{background:rgba(232,64,64,.2);color:#f08080}
.mi-type.practice{background:rgba(74,168,232,.15);color:#6ab8f0}
.qcard{background:var(--card);border:1px solid var(--bdr);border-radius:12px;
  overflow:hidden;min-width:0}
.qc-hd{display:flex;align-items:center;gap:5px;padding:6px 9px;
  background:rgba(0,0,0,.32);border-bottom:1px solid var(--bdr);flex-wrap:wrap;gap:4px}
.qc-lbl{font-size:13px;font-weight:900;color:var(--acc);min-width:22px}
.qc-hl{font-size:9px;padding:2px 6px;border-radius:5px;font-weight:700;white-space:nowrap}
.qc-hl.f{background:rgba(74,168,232,.17);color:#5ab8f0}
.qc-hl.s{background:rgba(232,64,64,.17);color:#f07070}
.qc-form{font-size:10px}
.qc-sp{flex:1}
.qc-copy{background:rgba(74,168,232,.12);color:#5ab8f0;font-size:9px;
  padding:2px 6px;border:1px solid rgba(74,168,232,.24);white-space:nowrap}

/* Changes IN/OUT */
.ch-row{display:flex;gap:3px;flex-wrap:wrap;padding:3px 9px 2px}
.ch{font-size:9px;padding:2px 5px;border-radius:7px;font-weight:700;white-space:nowrap}
.ch.in{background:rgba(48,208,128,.13);color:var(--in);border:1px solid rgba(48,208,128,.26)}
.ch.out{background:rgba(255,80,96,.13);color:var(--out);border:1px solid rgba(255,80,96,.26)}

/* ══════════════════════════════════════════════
   PITCH  (aspect-ratio 2/3, オリジナル準拠)
══════════════════════════════════════════════ */
.qbody{padding:8px;display:flex;flex-direction:column;gap:6px}
.pw{width:100%}
.pitch{
  position:relative;width:100%;aspect-ratio:2/3;
  max-width:100%;   /* スマホでは幅いっぱい使う */
  margin:0 auto;
  border-radius:8px;overflow:hidden;
  background:var(--pitch);border:2px solid rgba(255,255,255,.22);
  touch-action:none;
}
.pitch::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(180deg,
    transparent 0,transparent 12.5%,rgba(0,0,0,.05) 12.5%,rgba(0,0,0,.05) 25%)}
.pm{position:absolute;inset:0;pointer-events:none;z-index:1}
.pm-border{position:absolute;top:4%;left:10%;width:80%;height:92%;
  border:1.5px solid rgba(255,255,255,.4)}
.pm-mid{position:absolute;top:50%;left:10%;width:80%;height:0;
  border-top:1.5px solid rgba(255,255,255,.4)}
.pm-cc{position:absolute;top:50%;left:50%;width:18%;padding-bottom:18%;
  transform:translate(-50%,-50%);
  border:1.5px solid rgba(255,255,255,.4);border-radius:50%}
.pm-pt{position:absolute;top:4%;left:32%;width:36%;height:9%;
  border:1.5px solid rgba(255,255,255,.4);border-top:none}
.pm-pb{position:absolute;bottom:4%;left:32%;width:36%;height:9%;
  border:1.5px solid rgba(255,255,255,.4);border-bottom:none}

/* Position token — オリジナル.pdot準拠 */
.tok{position:absolute;transform:translate(-50%,-50%);z-index:10;
  cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none}
.pdot{
  width:38px;height:38px;border-radius:50%;
  border:2px solid rgba(255,255,255,.42);
  background:rgba(0,0,0,.22);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s;overflow:hidden;
}
.pdot:hover{border-color:#fff;background:rgba(255,255,255,.15)}
.tok.fill .pdot{background:rgba(21,63,128,.85);border-color:rgba(100,160,255,.9)}
.tok.chg  .pdot{background:rgba(100,20,20,.85);border-color:#ff5060;
  box-shadow:0 0 10px rgba(255,80,96,.4)}
.tok.gk   .pdot{background:rgba(65,30,0,.7);border-color:#f08020}
.tok.gk.fill .pdot{background:rgba(130,60,0,.85);border-color:rgba(255,160,50,.9)}
.p-lb{font-size:8px;color:rgba(255,255,255,.55);line-height:1}
.p-nm{font-size:9px;font-weight:700;color:#fff;max-width:34px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;text-align:center}
.p-nb{font-size:8px;color:rgba(255,255,255,.7);line-height:1}
/* タブレット */
@media(min-width:600px){
  .pdot{width:48px;height:48px}
  .p-nm{font-size:11px;max-width:44px}
  .p-lb{font-size:10px}
  .p-nb{font-size:9px}
}
/* PC拡大 — オリジナル準拠 */
@media(min-width:900px){
  .pitch{max-width:340px}
  .pdot{width:64px;height:64px}
  .p-nm{font-size:15px;max-width:60px}
  .p-lb{font-size:12px}
  .p-nb{font-size:10px}
}

/* Bench */
.bench-p{width:100%}
.bench-t{font-size:10px;color:var(--dim);font-weight:700;margin-bottom:4px;
  display:flex;align-items:center;justify-content:space-between}
.bench-cs{display:flex;flex-wrap:wrap;gap:3px;min-height:24px;padding:4px;
  border:1px dashed var(--bdr);border-radius:6px;background:rgba(255,255,255,.02)}
.bench-cs.dov{background:rgba(0,200,80,.07);border-color:#00e676}
.bc{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  border-radius:12px;padding:2px 8px;font-size:10px;
  display:flex;align-items:center;gap:3px;white-space:nowrap}
.bc-n{font-size:8px;color:var(--dim)}
.mgr-bench .bc{cursor:grab}
.mgr-bench .bc:hover{background:rgba(255,255,255,.14)}

/* Set pieces */
.sp-section{background:var(--card);border:1px solid var(--bdr);
  border-radius:10px;padding:8px 10px;width:100%;overflow:hidden}
.sp-title{font-size:11px;font-weight:700;color:var(--acc);margin-bottom:6px}
.sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
.sp-row{display:flex;align-items:center;gap:6px}
.sp-lbl{font-size:10px;color:var(--dim);width:32px;flex-shrink:0;font-weight:700}
.sp-sel{font-size:11px;flex:1}

/* Score */
.score-bar{background:#050d18;border:1px solid var(--bdr);
  border-radius:10px;padding:8px 12px;display:flex;align-items:center;
  gap:6px;flex-wrap:wrap;width:100%;overflow:hidden}
.sb-lbl{font-size:10px;color:var(--dim);font-weight:700;width:100%}
.sb-qs{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex:1}
.sq{display:flex;flex-direction:column;align-items:center;gap:2px}
.sq-l{font-size:9px;color:var(--dim)}
.sq-row{display:flex;align-items:center;gap:2px}
.sq-inp{width:32px;height:26px;text-align:center;font-size:13px;font-weight:900;
  padding:0;border-radius:5px;font-family:inherit}
.sq-col{font-size:12px;font-weight:900;color:var(--dim)}
.sb-total{display:flex;flex-direction:column;align-items:center;
  background:rgba(240,192,64,.07);border:1px solid rgba(240,192,64,.18);
  border-radius:7px;padding:4px 12px;margin-left:6px}
.sb-tl{font-size:9px;color:var(--acc)}
.sb-ts{font-size:20px;font-weight:900;color:var(--acc)}

/* Goals / Assists */
.goals-section{background:var(--card);border:1px solid var(--bdr);
  border-radius:10px;padding:8px 10px;width:100%;overflow:hidden}
.gs-title{font-size:11px;font-weight:700;color:var(--acc);margin-bottom:6px}
.gs-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.gs-lbl{font-size:10px;color:var(--dim);width:30px;flex-shrink:0}
.gs-sel{font-size:11px;flex:1;min-width:80px}
.gs-add{background:rgba(34,160,80,.2);color:var(--g2);font-size:11px;
  padding:4px 10px;border:1px solid rgba(34,160,80,.3)}
.gs-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.gs-chip{display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.07);border:1px solid var(--bdr);
  border-radius:12px;padding:2px 8px;font-size:10px}
.gs-del{background:none;color:var(--red);font-size:12px;padding:0;
  width:14px;height:14px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;flex-shrink:0}

/* Comments */
.comment-section{background:var(--card);border:1px solid var(--bdr);
  border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;gap:8px;
  width:100%}
.cs-title{font-size:11px;font-weight:700;color:var(--acc)}
.cs-block{display:flex;flex-direction:column;gap:4px}
.cs-lbl{font-size:10px;color:var(--dim);font-weight:700}
.cs-txt{width:100%;min-height:52px;font-size:12px}
.cs-txt[readonly]{background:rgba(255,255,255,.03);cursor:default;border-style:dashed}

/* Points table */
.pts-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;
  padding:10px 12px;width:100%;overflow:hidden}
.pts-title{font-size:12px;font-weight:700;color:var(--acc);margin-bottom:8px}
.pts-tbl{width:100%;border-collapse:collapse;font-size:11px}
.pts-tbl th{padding:4px 6px;text-align:center;color:var(--dim);
  border-bottom:1px solid var(--bdr);font-weight:700;font-size:10px;
  background:rgba(0,0,0,.2)}
.pts-tbl td{padding:4px 6px;text-align:center;
  border-bottom:1px solid rgba(26,48,80,.5)}
.pts-tbl tr:last-child td{border-bottom:none}
.pts-tbl .p-nick{text-align:left;font-weight:700}
.pts-tbl .p-total{font-weight:900;color:var(--acc)}
.pq{background:rgba(74,168,232,.1);border-radius:3px;padding:1px 4px}
.pq.ok{background:rgba(34,160,80,.2);color:#88dda8}
.pq.gk{background:rgba(240,130,0,.2);color:#f0a040}

/* ══════════════════════════════════════════════
   STATS VIEW (集計ページ)
══════════════════════════════════════════════ */
.sv-head{background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sv-head select{font-size:12px}
.sv-sec{background:var(--card);border:1px solid var(--bdr);border-radius:12px;
  padding:10px 12px}
.sv-sec-t{font-size:13px;font-weight:700;color:var(--acc);margin-bottom:8px;
  border-bottom:1px solid var(--bdr);padding-bottom:6px}
.sv-tbl{width:100%;border-collapse:collapse;font-size:11px}
.sv-tbl th{padding:5px 7px;text-align:center;color:var(--dim);
  border-bottom:1px solid var(--bdr);font-weight:700;font-size:10px;
  background:rgba(0,0,0,.2);white-space:nowrap}
.sv-tbl td{padding:5px 7px;text-align:center;border-bottom:1px solid rgba(26,48,80,.4)}
.sv-tbl .t-name{text-align:left;font-weight:700}
.sv-tbl .t-acc{color:var(--acc);font-weight:900}
.sv-tbl tr:last-child td{border-bottom:none}
.sv-tbl tr:hover td{background:rgba(255,255,255,.03)}
.sv-win{color:var(--in);font-weight:700}
.sv-lose{color:var(--out);font-weight:700}
.sv-draw{color:var(--dim);font-weight:700}

/* ══════════════════════════════════════════════
   MODALS
══════════════════════════════════════════════ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:5000;
  display:none;align-items:center;justify-content:center;padding:12px}
.ov.on{display:flex}
.mbox{background:var(--card);border:1px solid var(--bdr);border-radius:16px;
  width:100%;max-width:400px;max-height:88vh;display:flex;flex-direction:column;
  box-shadow:0 20px 70px rgba(0,0,0,.72);overflow:hidden}
.m-hd{padding:11px 14px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.m-hd-t{font-size:14px;font-weight:700}
.m-xbtn{background:rgba(255,255,255,.08);color:#fff;font-size:14px;
  width:26px;height:26px;padding:0;border-radius:6px;
  display:flex;align-items:center;justify-content:center}
.m-body{overflow-y:auto;flex:1;padding:8px}
.mpl{display:flex;align-items:center;gap:7px;padding:8px 10px;
  border-radius:8px;cursor:pointer;border:1px solid transparent;transition:background .1s}
.mpl:hover{background:rgba(255,255,255,.06)}
.mpl.sel{background:rgba(10,72,36,.38);border-color:var(--g2)}
.mpl.occ{opacity:.35;pointer-events:none}
.mpl-n{font-size:10px;color:var(--dim);width:20px;text-align:right;flex-shrink:0}
.mpl-nk{font-size:14px;font-weight:700;flex:1}
.mpl-nm{font-size:10px;color:var(--dim)}
.mpl-clr{width:100%;background:rgba(232,64,64,.1);color:var(--red);
  border:1px solid rgba(232,64,64,.26);padding:10px;margin-top:6px;border-radius:8px}
.mm-b{padding:14px 16px;display:flex;flex-direction:column;gap:11px}
.mm-l{font-size:11px;color:var(--dim);margin-bottom:4px}
.mm-row{display:flex;gap:8px}
.mm-sv{flex:1;background:linear-gradient(135deg,var(--g2),var(--g3));
  color:#fff;font-size:14px;font-weight:700;padding:11px;border-radius:10px}
.mm-dl{background:rgba(232,64,64,.1);color:var(--red);font-size:12px;
  padding:10px 13px;border:1px solid rgba(232,64,64,.26);border-radius:10px}
.mem-i{display:flex;align-items:center;gap:6px;padding:7px 10px;
  border-bottom:1px solid var(--bdr)}
.mem-n{font-size:10px;color:var(--dim);width:20px;text-align:right;flex-shrink:0}
.mem-nk{font-size:13px;font-weight:700;flex:1}
.mem-nm{font-size:10px;color:var(--dim);width:64px;flex-shrink:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Toast */
#toast{position:fixed;bottom:18px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(30,150,70,.92);color:#fff;font-size:13px;font-weight:700;
  padding:9px 20px;border-radius:20px;z-index:9999;
  transition:transform .28s;pointer-events:none;white-space:nowrap}
#toast.on{transform:translateX(-50%) translateY(0)}

/* Ghost drag */
#ghost{position:fixed;pointer-events:none;z-index:9999;
  background:rgba(21,63,128,.92);border:2px solid rgba(100,160,255,.9);
  border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;
  color:#fff;white-space:nowrap;display:none;transform:translate(-50%,-50%)}

/* ══════════════════════════════════════════════

  /* ── ピッチ：大きく、読みやすく ── */
  .pw{width:100%!important}
  .pitch{
    max-width:100%!important;
    width:100%!important;
    aspect-ratio:2/3!important;
    border:2px solid #555!important;

    position:relative!important;
  }
  .pitch::before{
    background:repeating-linear-gradient(180deg,
      transparent 0,transparent 12.5%,rgba(0,0,0,.04) 12.5%,rgba(0,0,0,.04) 25%)!important;
  }
  /* フィールドラインを黒に */
  .pm-border,.pm-mid,.pm-cc,.pm-pt,.pm-pb{
    border-color:rgba(0,0,0,.5)!important;
  }

  /* ── トークン：大きく鮮明に ── */
  .tok{z-index:10!important}
  .pdot{
    width:42px!important;
    height:42px!important;
    border:2px solid #333!important;
    background:#e3f2fd!important;
    border-radius:50%!important;
    display:flex!important;
    flex-direction:column!important;
    align-items:center!important;
    justify-content:center!important;
    overflow:visible!important;
  }
  .tok.fill .pdot{background:#c5cae9!important;border-color:#303f9f!important}

  /* ニックネーム：確実に読める */
  .p-nb{
    font-size:8px!important;
    color:#555!important;
    line-height:1!important;
    display:block!important;
  }
  .p-nm{

    white-space:normal!important;  /* ← 折り返し許可 */

    line-height:1.1!important;
    text-align:center!important;
    overflow:visible!important;    /* ← 切り取らない */
    text-overflow:unset!important;
    display:block!important;
  }
  .p-lb{font-size:9px!important;color:#555!important}

  /* ベンチ */
  .bench-p{margin-top:2px!important}
  .bench-t{font-size:9px!important;color:#555!important;margin-bottom:2px!important}
  .bench-cs{border:1px solid #ccc!important;padding:2px!important;border-radius:3px!important;
    background:#fafafa!important}
  .bc{border:1px solid #aaa!important;color:#000!important;
    background:#fff!important;font-size:9px!important;padding:1px 5px!important}
  .bc-n{color:#666!important}

  /* スコア・集計・コメントは非表示（1ページに収めるため） */

  .sp-section,.goals-section{display:none!important}

  /* リーグバッジ（両/都/世）を印刷でも表示 */

    padding:2px 5px!important;

  .pl-lg.都{background:#dbeeff!important;color:#005a9c!important}

}
</style>
</head>

// ── 出場ポイント計算（オリジナル準拠: GK分離, 1Q=1pt）──
function calcPoints(){
  const pts={};
  MB.forEach(m=>{pts[m.num]={total:0,gk:0,field:0,detail:[]};});
  Object.values(S.matches).forEach(m=>{
    QS.forEach(q=>{
      const pos=(m[q]&&m[q].positions)||{};
      const onPitch=new Set(Object.values(pos).filter(Boolean));
      const gkNum=pos.gk||null;
      MB.forEach(mb=>{
        const n=mb.num;
        if(!pts[n])pts[n]={total:0,gk:0,field:0,detail:[]};
        const played=onPitch.has(n);
        const isGK=(gkNum===n);
        const gkP=isGK?1:0;
        const fieldP=played&&!isGK?1:0;
        if(played){
          pts[n].gk+=gkP;
          pts[n].field+=fieldP;
          pts[n].total+=fieldP; // GK除外の合計（オリジナル準拠）
        }
      });
    });
  });
  return pts;
}

// ── 年別集計 ──
function calcYearStats(year,typeFilter){
  const matches=Object.values(S.matches).filter(m=>{
    if(!m.date)return false;
    const y=parseInt(m.date.split('-')[0]);
    if(y!==year)return false;
    if(typeFilter==='official')return m.matchType==='official';
    if(typeFilter==='practice')return m.matchType==='practice';
    return true;
  });
  const playerStats={};
  MB.forEach(m=>{playerStats[m.num]={pts:0,gkPts:0,goals:0,assists:0,played:0};});
  const oppStats={};

  matches.forEach(m=>{
    // player stats
    const presentNums=new Set();
    QS.forEach(q=>{
      const pos=(m[q]&&m[q].positions)||{};
      Object.values(pos).filter(Boolean).forEach(n=>presentNums.add(n));
    });
    QS.forEach(q=>{
      const pos=(m[q]&&m[q].positions)||{};
      const onPitch=new Set(Object.values(pos).filter(Boolean));
      const gkNum=pos.gk||null;
      onPitch.forEach(n=>{
        if(!playerStats[n])playerStats[n]={pts:0,gkPts:0,goals:0,assists:0,played:0};
        if(n===gkNum) playerStats[n].gkPts++;
        else playerStats[n].pts++;
      });
    });
    presentNums.forEach(n=>{
      if(!playerStats[n])return;
      playerStats[n].played++;
    });
    (m.goals||[]).forEach(g=>{
      if(g.scorer&&playerStats[g.scorer])playerStats[g.scorer].goals++;
      if(g.assist&&playerStats[g.assist])playerStats[g.assist].assists++;
    });
    // opponent stats
    const opp=m.opponent||'不明';
    if(!oppStats[opp])oppStats[opp]={w:0,d:0,l:0,gf:0,ga:0};
    const gf=(m.score.own||[]).reduce((a,b)=>a+b,0);
    const ga=(m.score.opp||[]).reduce((a,b)=>a+b,0);
    oppStats[opp].gf+=gf;oppStats[opp].ga+=ga;
    if(gf>ga)oppStats[opp].w++;
    else if(gf<ga)oppStats[opp].l++;
    else oppStats[opp].d++;
  });
  return {playerStats,oppStats,matchCount:matches.length};
}

  });
  save();renderMC();toast('自動配置しました');
}

    ${isM?`<button class="hb mo" onclick="openMM('edit')" style="font-size:10px;padding:4px 8px">✎ 編集</button>`:''}`;
}

// ══════════════════════════════════════════════════════
// HALVES / QUARTERS
// ══════════════════════════════════════════════════════
function renderHalves(m){
  const isM=S.role==='manager';
  const qCard=qi=>{
    const q=QS[qi];
    const qd=m[q]||{formation:DF,positions:{}};
    const form=qd.formation||DF;
    const fd=FORMS[form]||FORMS[DF];
    const pos=qd.positions||{};
    const onP=new Set(Object.values(pos).filter(Boolean));
    let ins=[],outs=[];
    if(qi>0){
      const pp=m[QS[qi-1]].positions||{};
      const prev=new Set(Object.values(pp).filter(Boolean));
      onP.forEach(n=>{if(!prev.has(n))ins.push(n);});
      prev.forEach(n=>{if(!onP.has(n))outs.push(n);});
    }
    const bench=MB.filter(p=>S.present[p.num]&&!onP.has(p.num));
    const toks=fd.map(p=>{
      const pn=pos[p.id]||null,pl=pn?gm(pn):null;
      const fil=!!pl,chg=fil&&ins.includes(pn),isGK=p.lb==='GK';
      return `<div class="tok${fil?' fill':''}${chg?' chg':''}${isGK?' gk':''}"
        style="left:${p.x}%;top:${p.y}%"
        data-q="${q}" data-pid="${p.id}"
        ${isM?`onclick="openPM('${q}','${p.id}')"`:''}
        ondragover="event.preventDefault()"
        ondrop="dp(event,'${q}','${p.id}')">
        <div class="pdot">
          ${fil?`<span class="p-nb">${pl.num}</span><span class="p-nm">${pl.nick}</span>`
              :`<span class="p-lb">${p.lb}</span>`}
        </div>
      </div>`;
    }).join('');
    const fo=Object.keys(FORMS).map(f=>`<option value="${f}"${f===form?' selected':''}>${f}</option>`).join('');
    const chHtml=(ins.length||outs.length)?`<div class="ch-row">
      ${ins.map(n=>`<span class="ch in">▲IN #${gno(n)} ${gnk(n)}</span>`).join('')}
      ${outs.map(n=>`<span class="ch out">▼OUT #${gno(n)} ${gnk(n)}</span>`).join('')}
    </div>`:'';
    const bcHtml=bench.map(p=>`<span class="bc"
      ondragover="event.preventDefault()" ondrop="dpB(event,'${q}')">
      <span class="bc-n">${p.num}</span>${p.nick}</span>`).join('');
    const isF=qi<2;
    return `<div class="qcard">
      <div class="qc-hd">
        <span class="qc-lbl">${QL[qi]}</span>
        <span class="qc-hl ${isF?'f':'s'}">${isF?'前半':'後半'}</span>
        ${isM?`<select class="qc-form" onchange="chForm('${q}',this.value)">${fo}</select>`
            :`<span style="font-size:10px;color:var(--dim)">${form}</span>`}
        <div class="qc-sp"></div>
        ${isM&&qi>0?`<button class="qc-copy" onclick="cpQ('${q}','${QS[qi-1]}')">前Qコピー</button>`:''}
      </div>
      ${chHtml}
      <div class="qbody">
        <div class="pw" ondragover="event.preventDefault()" ondrop="event.preventDefault()">
          <div class="pitch">
            <div class="pm">
              <div class="pm-border"></div><div class="pm-mid"></div>
              <div class="pm-cc"></div><div class="pm-pt"></div><div class="pm-pb"></div>
            </div>
            ${toks}
          </div>
        </div>
        <div class="bench-p ${isM?'mgr-bench':''}">
          <div class="bench-t"><span>🪑 ベンチ (${bench.length})</span></div>
          <div class="bench-cs" ondragover="event.preventDefault()" ondrop="dpB(event,'${q}')">
            ${bcHtml||'<span style="font-size:10px;color:var(--dim)">–</span>'}
          </div>
        </div>
      </div>
    </div>`;
  };
  document.getElementById('halves').innerHTML=`
    <div class="half-row">${qCard(0)}${qCard(1)}</div>
    <div class="half-row">${qCard(2)}${qCard(3)}</div>`;
}
function chForm(q,form){
  if(!S.cid)return;
  const m=S.matches[S.cid];m[q].formation=form;
  const v=new Set((FORMS[form]||[]).map(p=>p.id));
  Object.keys(m[q].positions).forEach(k=>{if(!v.has(k))delete m[q].positions[k];});
  save();renderHalves(m);renderPts();
}
function cpQ(toQ,fromQ){
  if(!S.cid)return;
  const m=S.matches[S.cid];
  m[toQ].formation=m[fromQ].formation;m[toQ].positions={...m[fromQ].positions};
  save();renderHalves(m);renderPts();toast(`${QL[QS.indexOf(fromQ)]}→${QL[QS.indexOf(toQ)]} コピー`);
}

function renderSP(m){

// GOALS / ASSISTS
// ══════════════════════════════════════════════════════
function renderGoals(m){
  const isM=S.role==='manager';
  const goals=m.goals||[];
  const pres=MB.filter(p=>S.present[p.num]);
  const opts=`<option value="">-</option>`+pres.map(p=>`<option value="${p.num}">${p.num} ${p.nick}</option>`).join('');
  const chipHtml=goals.map((g,i)=>`
    <span class="gs-chip">
      <span>⚽ #${gno(g.scorer)} ${gnk(g.scorer)}</span>
      ${g.assist?`<span style="color:var(--dim);font-size:9px"> A:#${gno(g.assist)} ${gnk(g.assist)}</span>`:''}
      ${g.q?`<span style="color:var(--dim);font-size:9px"> ${QL[QS.indexOf(g.q)]||''}</span>`:''}
      ${isM?`<button class="gs-del" onclick="delGoal(${i})">×</button>`:''}
    </span>`).join('');
  document.getElementById('goals-section').innerHTML=`
    <div class="gs-title">⚽ 得点・アシスト</div>
    ${isM?`<div class="gs-row">
      <span class="gs-lbl">得点</span>
      <select class="gs-sel" id="g-scorer">${opts}</select>
      <span class="gs-lbl" style="width:38px">アシスト</span>
      <select class="gs-sel" id="g-assist">${opts}</select>
      <select class="gs-sel" id="g-q" style="max-width:50px">
        ${QS.map((q,i)=>`<option value="${q}">${QL[i]}</option>`).join('')}
      </select>
      <button class="gs-add" onclick="addGoal()">追加</button>
    </div>`:''}
    <div class="gs-list">${chipHtml||'<span style="font-size:10px;color:var(--dim)">得点なし</span>'}</div>`;
}
function addGoal(){
  if(!S.cid)return;
  const scorer=parseInt(document.getElementById('g-scorer').value)||null;
  if(!scorer){toast('得点者を選択してください');return;}
  const assist=parseInt(document.getElementById('g-assist').value)||null;
  const q=document.getElementById('g-q').value;
  const m=S.matches[S.cid];
  if(!m.goals)m.goals=[];
  m.goals.push({scorer,assist,q});
  // score update
  const qi=QS.indexOf(q);
  if(qi>=0){if(!m.score)m.score={own:[0,0,0,0],opp:[0,0,0,0]};m.score.own[qi]++;}
  save();renderGoals(m);renderScore(m);renderSB();
}
function delGoal(i){
  if(!S.cid)return;
  const m=S.matches[S.cid];
  const g=m.goals[i];
  const qi=QS.indexOf(g.q);
  if(qi>=0&&m.score&&m.score.own[qi]>0)m.score.own[qi]--;
  m.goals.splice(i,1);
  save();renderGoals(m);renderScore(m);
}

// ══════════════════════════════════════════════════════
// POINTS TABLE
// ══════════════════════════════════════════════════════
function renderPts(){
  const m=S.matches[S.cid];
  if(!m)return;
  const present=MB.filter(p=>S.present[p.num]);
  if(!present.length){document.getElementById('pts-card').innerHTML='';return;}
  const rows=present.map(p=>{
    const qs=QS.map(q=>{
      const pos=(m[q]&&m[q].positions)||{};
      const onPitch=Object.values(pos).includes(p.num);
      const isGK=pos.gk===p.num;
      return{played:onPitch,isGK};
    });
    const gkPts=qs.filter(r=>r.isGK).length;
    const fldPts=qs.filter(r=>r.played&&!r.isGK).length;
    const total=fldPts;
    return{p,qs,gkPts,fldPts,total};
  }).sort((a,b)=>b.total-a.total||a.p.num-b.p.num);
  const thead=`<tr>
    <th style="text-align:left">選手</th>
    ${QL.map(l=>`<th>${l}</th>`).join('')}
    <th>FLD</th><th>GK</th><th>計</th></tr>`;
  const tbody=rows.map(({p,qs,gkPts,fldPts,total})=>`<tr>
    <td class="p-nick">${p.nick}</td>
    ${qs.map(r=>`<td><span class="pq${r.played?(r.isGK?' gk':' ok'):''}">${r.played?(r.isGK?'GK':'●'):'–'}</span></td>`).join('')}
    <td>${fldPts||'-'}</td>
    <td>${gkPts||'-'}</td>
    <td class="p-total">${fldPts+gkPts||'-'}</td>
  </tr>`).join('');
  document.getElementById('pts-card').innerHTML=`
    <div class="pts-title">📊 出場ポイント（FLD=1pt/Q、GK別計）</div>
    <div style="overflow-x:auto"><table class="pts-tbl"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

// ══════════════════════════════════════════════════════
// SCORE
// ══════════════════════════════════════════════════════
function renderScore(m){
  if(!m)m=S.matches[S.cid];
  if(!m)return;
  const sc=m.score||{own:[0,0,0,0],opp:[0,0,0,0]};
  const isM=S.role==='manager';
  const ot=sc.own.reduce((a,b)=>a+b,0),pt=sc.opp.reduce((a,b)=>a+b,0);
  const qh=QL.map((l,i)=>`
    <div class="sq"><div class="sq-l">${l}</div><div class="sq-row">
      ${isM?`<input class="sq-inp" type="number" min="0" max="99" value="${sc.own[i]||0}" onchange="setSc(${i},'own',this.value)" style="color:var(--in)">`
          :`<span style="min-width:22px;text-align:center;font-size:13px;font-weight:900;color:var(--in)">${sc.own[i]||0}</span>`}
      <span class="sq-col">-</span>
      ${isM?`<input class="sq-inp" type="number" min="0" max="99" value="${sc.opp[i]||0}" onchange="setSc(${i},'opp',this.value)" style="color:var(--out)">`
          :`<span style="min-width:22px;text-align:center;font-size:13px;font-weight:900;color:var(--out)">${sc.opp[i]||0}</span>`}
    </div></div>`).join('<span style="color:var(--dim);padding-top:14px;font-size:10px">｜</span>');
  document.getElementById('score-bar').innerHTML=`
    <div class="sb-lbl">スコア <span style="color:var(--in)">●自</span>：<span style="color:var(--out)">●相手</span></div>
    <div class="sb-qs">${qh}</div>
    <div class="sb-total"><div class="sb-tl">合計</div><div class="sb-ts" id="sc-tot">${ot} - ${pt}</div></div>`;
}
function setSc(qi,tm,v){
  const m=S.matches[S.cid];if(!m)return;
  if(!m.score)m.score={own:[0,0,0,0],opp:[0,0,0,0]};
  m.score[tm][qi]=Math.max(0,parseInt(v)||0);save();
  const el=document.getElementById('sc-tot');
  if(el){const ot=m.score.own.reduce((a,b)=>a+b,0),pt=m.score.opp.reduce((a,b)=>a+b,0);el.textContent=`${ot} - ${pt}`;}
}

// ══════════════════════════════════════════════════════
// STATS VIEW
// ══════════════════════════════════════════════════════
function renderStats(){
  const sv=document.getElementById('stats-view');
  const years=[...new Set(Object.values(S.matches).map(m=>m.date?parseInt(m.date.split('-')[0]):null).filter(Boolean))].sort((a,b)=>b-a);
  if(!years.includes(S.statsYear)&&years.length)S.statsYear=years[0];
  const yearOpts=years.map(y=>`<option value="${y}"${y===S.statsYear?' selected':''}>${y}年</option>`).join('');
  const typeOpts=`
    <option value="all"${S.statsType==='all'?' selected':''}>全試合</option>
    <option value="official"${S.statsType==='official'?' selected':''}>公式戦</option>
    <option value="practice"${S.statsType==='practice'?' selected':''}>練習試合</option>`;

  const {playerStats,oppStats,matchCount}=calcYearStats(S.statsYear,S.statsType);

  // Player table
  const plRows=MB.map(m=>{
    const s=playerStats[m.num]||{pts:0,gkPts:0,goals:0,assists:0,played:0};
    return{m,s};
  }).filter(({s})=>s.played>0||s.pts>0||s.goals>0)
    .sort((a,b)=>b.s.pts-a.s.pts||b.s.goals-a.s.goals||a.m.num-b.m.num);

  const plHtml=plRows.length?plRows.map(({m,s})=>`<tr>
    <td class="t-name">${m.num} ${m.nick}</td>
    <td>${s.played||'-'}</td>
    <td class="t-acc">${s.pts||'-'}</td>
    <td>${s.gkPts||'-'}</td>
    <td>${s.goals||'-'}</td>
    <td>${s.assists||'-'}</td>
  </tr>`).join(''):`<tr><td colspan="6" style="color:var(--dim);text-align:center">データなし</td></tr>`;

  // Opponent table
  const oppRows=Object.entries(oppStats).sort((a,b)=>b[1].w-a[1].w||(b[1].gf-b[1].ga)-(a[1].gf-a[1].ga));
  const oppHtml=oppRows.length?oppRows.map(([opp,s])=>`<tr>
    <td class="t-name">${opp}</td>
    <td>${s.w+s.d+s.l}</td>
    <td class="sv-win">${s.w}</td><td class="sv-draw">${s.d}</td><td class="sv-lose">${s.l}</td>
    <td>${s.gf}</td><td>${s.ga}</td>
    <td style="font-size:10px">${s.gf>s.ga?'▲':''}${s.gf-s.ga>0?'+':''}${s.gf-s.ga}</td>
  </tr>`).join(''):`<tr><td colspan="8" style="color:var(--dim);text-align:center">データなし</td></tr>`;

  sv.innerHTML=`
    <div class="sv-head">
      <b style="font-size:13px;color:var(--acc)">📊 年間集計</b>
      <select onchange="S.statsYear=parseInt(this.value);renderStats()">${yearOpts||'<option>-</option>'}</select>
      <select onchange="S.statsType=this.value;renderStats()">${typeOpts}</select>
      <span style="font-size:11px;color:var(--dim)">${matchCount}試合</span>
    </div>
    <div class="sv-sec">
      <div class="sv-sec-t">選手別成績</div>
      <div style="overflow-x:auto">
      <table class="sv-tbl">
        <thead><tr>
          <th style="text-align:left">選手</th>
          <th>出場試合</th><th>FLDpt</th><th>GKpt</th><th>得点</th><th>アシスト</th>
        </tr></thead>
        <tbody>${plHtml}</tbody>
      </table></div>
    </div>
    <div class="sv-sec">
      <div class="sv-sec-t">対戦成績</div>
      <div style="overflow-x:auto">
      <table class="sv-tbl">
        <thead><tr>
          <th style="text-align:left">対戦相手</th>
          <th>試合</th><th>勝</th><th>分</th><th>負</th><th>得点</th><th>失点</th><th>得失</th>
        </tr></thead>
        <tbody>${oppHtml}</tbody>
      </table></div>
    </div>`;
}

// ══════════════════════════════════════════════════════
// PLAYER MODAL
// ══════════════════════════════════════════════════════
let _pq=null,_pp=null;
function openPM(q,pid){
  if(S.role!=='manager')return;
  _pq=q;_pp=pid;
  const m=S.matches[S.cid];
  const pos=m[q].positions||{};
  const fd=FORMS[m[q].formation]||FORMS[DF];
  const pi=fd.find(p=>p.id===pid);
  document.getElementById('pl-t').textContent=`${pi?pi.lb:pid} ▸ 選手選択`;
  const onP=new Set(Object.entries(pos).filter(([k])=>k!==pid).map(([,v])=>v));
  const cur=pos[pid]||null;
  const pres=MB.filter(p=>S.present[p.num]);
  document.getElementById('pl-b').innerHTML=
    pres.map(p=>{
      const sel=p.num===cur,occ=onP.has(p.num);
      return `<div class="mpl${sel?' sel':''}${occ?' occ':''}" onclick="pickP(${p.num})">
        <span class="mpl-n">${p.num}</span>
        <span class="mpl-nk">${p.nick}</span>
        <span class="mpl-nm">${p.name}</span>
        ${sel?'<span style="color:var(--g2);font-size:11px">✓</span>':''}
        ${occ?'<span style="font-size:9px;color:var(--dim)">配置中</span>':''}
      </div>`;
    }).join('')+
    `<button class="mpl-clr" onclick="clrPos()">このポジションをクリア</button>`;
  document.getElementById('pl-ov').classList.add('on');
}
function pickP(num){
  if(!_pq||!_pp||!S.cid)return;
  const pos=S.matches[S.cid][_pq].positions;
  Object.keys(pos).forEach(k=>{if(pos[k]===num)delete pos[k];});
  pos[_pp]=num;
  save();xM('pl-ov');renderHalves(S.matches[S.cid]);renderPts();renderSB();
}
function clrPos(){
  if(!_pq||!_pp||!S.cid)return;
  delete S.matches[S.cid][_pq].positions[_pp];
  save();xM('pl-ov');renderHalves(S.matches[S.cid]);renderPts();
}

// ══════════════════════════════════════════════════════
// MATCH MODAL
// ══════════════════════════════════════════════════════
let _eid=null;
function openMM(mode){
  if(S.role!=='manager')return;_eid=null;
  const isE=mode==='edit'&&S.cid;
  document.getElementById('mm-t').textContent=isE?'試合を編集':'試合を追加';
  document.getElementById('mm-dl').style.display=isE?'':'none';
  if(isE){_eid=S.cid;const m=S.matches[S.cid];
    document.getElementById('mm-date').value=m.date||'';
    document.getElementById('mm-opp').value=m.opponent||'';
    document.getElementById('mm-ven').value=m.venue||'';
    document.getElementById('mm-type').value=m.matchType||'official';
  }else{
    document.getElementById('mm-date').value=new Date().toISOString().split('T')[0];
    document.getElementById('mm-opp').value='';document.getElementById('mm-ven').value='';
    document.getElementById('mm-type').value='official';
  }
  document.getElementById('mm-ov').classList.add('on');
}
function svMatch(){
  const date=document.getElementById('mm-date').value;
  const opp=document.getElementById('mm-opp').value.trim();
  const ven=document.getElementById('mm-ven').value.trim();
  const type=document.getElementById('mm-type').value;
  if(_eid){Object.assign(S.matches[_eid],{date,opponent:opp,venue:ven,matchType:type});}
  else{const id='m'+S.nid++;const em=emptyM(date,opp,ven,type);em.id=id;S.matches[id]=em;S.cid=id;}
  save();xM('mm-ov');renderTabs();renderMC();renderSB();toast(_eid?'試合情報を更新':'試合を追加しました');
}
function dlMatch(){
  if(!_eid||!confirm('この試合を削除しますか？'))return;
  delete S.matches[_eid];const k=sIds();S.cid=k.length?k[0]:null;
  save();xM('mm-ov');renderTabs();renderMC();toast('試合を削除しました');
}

function openMemModal(){
  document.getElementById('mem-b').innerHTML=MB.map(m=>{
    const lg=gmlg(m.num);
    return `<div class="mem-i">
      <span class="mem-n">${m.num}</span><span class="mem-nk">${m.nick}</span>
      <span class="mem-nm">${m.name}</span>
      <select class="mem-ls" onchange="setML(${m.num},this.value)" style="font-size:11px;padding:3px 5px">
        <option value="都"${lg==='都'?' selected':''}>都</option>
        <option value="世"${lg==='世'?' selected':''}>世</option>
        <option value="両"${lg==='両'?' selected':''}>両方</option>
      </select>
    </div>`;
  }).join('');
  document.getElementById('mem-ov').classList.add('on');
}
function setML(n,v){S.mlg[n]=v;save();renderSB();}

// ══════════════════════════════════════════════════════
// DRAG & DROP — desktop
// ══════════════════════════════════════════════════════
let _dn=null;
const ghost=document.getElementById('ghost');
function ds(e,n){
  _dn=n;e.dataTransfer.effectAllowed='move';
  ghost.textContent=gnk(n);ghost.style.display='block';
}
document.addEventListener('dragend',()=>{ghost.style.display='none';_dn=null;});
document.addEventListener('dragover',e=>{
  ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';
});
function dp(e,q,pid){
  e.preventDefault();if(!_dn||!S.cid||S.role!=='manager')return;
  const pos=S.matches[S.cid][q].positions;
  Object.keys(pos).forEach(k=>{if(pos[k]===_dn)delete pos[k];});
  pos[pid]=_dn;_dn=null;ghost.style.display='none';
  save();renderHalves(S.matches[S.cid]);renderPts();renderSB();
}
function dpB(e,q){
  e.preventDefault();if(!_dn||!S.cid||S.role!=='manager')return;
  const pos=S.matches[S.cid][q].positions;
  Object.keys(pos).forEach(k=>{if(pos[k]===_dn)delete pos[k];});
  _dn=null;ghost.style.display='none';
  save();renderHalves(S.matches[S.cid]);renderPts();renderSB();
}

// ══════════════════════════════════════════════════════
// TOUCH DRAG — mobile
// ══════════════════════════════════════════════════════
let _tdn=null,_tg=null;
function ts(e,n){
  if(S.role!=='manager')return;_tdn=n;
  const t=e.touches[0];
  _tg=document.createElement('div');
  _tg.style.cssText=`position:fixed;z-index:9900;pointer-events:none;
    background:rgba(21,63,128,.92);border:2px solid rgba(100,160,255,.9);
    color:#fff;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;
    transform:translate(-50%,-50%);left:${t.clientX}px;top:${t.clientY}px`;
  _tg.textContent=gnk(n);document.body.appendChild(_tg);
}
function tm(e){
  if(!_tdn||!_tg)return;e.preventDefault();
  const t=e.touches[0];_tg.style.left=t.clientX+'px';_tg.style.top=t.clientY+'px';
}
function te(e){
  if(!_tdn)return;if(_tg){_tg.remove();_tg=null;}
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el&&S.cid){
    const tok=el.closest('[data-pid]');
    if(tok){
      const q=tok.dataset.q,pid=tok.dataset.pid;
      const pos=S.matches[S.cid][q].positions;
      Object.keys(pos).forEach(k=>{if(pos[k]===_tdn)delete pos[k];});
      pos[pid]=_tdn;save();renderHalves(S.matches[S.cid]);renderPts();renderSB();
    }
  }
  _tdn=null;
}

// ══════════════════════════════════════════════════════
// PRINT
// ══════════════════════════════════════════════════════
function doPrint(){ window.print(); }

// ══════════════════════════════════════════════════════
// MODAL UTILS / TOAST
// ══════════════════════════════════════════════════════
function xM(id){document.getElementById(id).classList.remove('on');}
function xOv(e,id){if(e.target.id===id)xM(id);}
let _tt=null;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2200);
}

// ══════════════════════════════════════════════════════
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    showS('s-szk');document.getElementById('szk-pw').focus();
  },600);
});
</script>
